name: "eNet Sender"
description: "Bridges eNet smart home bus to a REST API for Home Assistant"
version: "1.5.34"
slug: "enetsender"
image: "ghcr.io/joergni/enetsender"
init: false
map:
  - data:rw
arch:
  - aarch64
startup: application
boot: auto
watchdog: "http://[HOST]:[PORT:8080]/health"
host_network: true
ports:
  8080/tcp: 8080
ports_description:
  8080/tcp: "eNet REST API"
options:
  enet_host: "192.168.178.34"
  enet_port: 9050
schema:
  enet_host: str
  enet_port: int
